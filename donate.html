    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Shower with Love</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="about.html">Our Story</a>
        <a class="nav-link" href="find-us.html">Find Us</a>

        <a class="nav-link" href="donate.html">Donate</a>
      </div>
    </div>
  </div>
</nav>
    </header>
    <main>
        <div class="row justify-content-center">
        <div class="col-md-8">
      <h2 class="section-title">Help us by Donating</h2>
      <div class="form-container">
        <form name="formValidation" id="formValidation">
            <label for="anonymous">
                <input type="checkbox" id="anonymous" name="anonymous"> Donate Anonymously
            </label>
            <label for="name">Name <span>(Optional)</span></label>
            <input type="text" id="name" name="name" placeholder="Enter your name">
    
            <label for="email">Email <span>(Required)</span></label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
    
            <label for="phone">Phone Number <span>(Optional)</span></label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" maxlength="10">

            <label for="card">Credit Card Information</label>
            <input type="text" id="card" name="card" placeholder="Enter your credit card number" maxlength="19">
            <div class="row">
            <div class="col-md-6">
                <label for="expiration">Expiration Date</label>
                <input type="text" id="expiration" name="expiration" placeholder="MM/YY" maxlength="5">
            </div>
            <div class="col-md-6">
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" name="cvv" placeholder="Enter your credit card CVV" maxlength="4">
            </div>
          </div>
            <label for="billing">Billing Address <span>(Required)</span></label>
            <input type="text" id="billing" name="billing" placeholder="Enter your billing address" required>

            <label for="amount">Donation Amount:</label>
            <select id="amount" name="amount">
                <option value="">-- Select an option --</option>
                <option value="5">$5</option>
                <option value="10">$10</option>
                <option value="20">$20</option>
                <option value="50">$50</option>
                <option value="100">$100</option>
                <option value="other">Other</option>
            </select>

            <input type="text" id="otherAmount" name="otherAmount" placeholder="Enter other amount" style="display:none; margin-top: 10px;">

            <button type="submit" class="btn btn-sm">Submit</button>
        </form>
      </div>
    </div>
    </div>
    </main>
    <footer>
        <p>Copyright &copy; 2026 Shower with Love</p>
    </footer>

    <script src="js/donate-form.js"></script>
  </body>
