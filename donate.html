<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="nav-brand">
          <a href="index.html">Shower with Love</a>
        </div>
      <ul class="nav-list">
        <li><a href="about.html">Our Story</a></li>
        <li><a href="find-us.html">Find Us</a></li>
        <li><a href="contact.html">Volunteer</a></li>
        <li><a href="donate.html">Donate</a></li>
      </ul>
      <div class="rightNav">
        <input type="text" name="search" id="search" placeholder="Search">
        <button class="btn btn-sm">Search</button>
      </div>
    </nav>
    </header>
    <main>
      <h2 class="section-title">Help us by Donating</h2>
      <div class="form-container">
        <form>
            <label for="anonymous">
                <input type="checkbox" id="anonymous" name="anonymous"> Donate Anonymously
            </label>
            <label for="name">Name <span>(Optional)</span></label>
            <input type="text" id="name" placeholder="Enter your name">
    
            <label for="email">Email <span>(Required)</span></label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
    
            <label for="phone">Phone Number <span>(Optional)</span></label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">

            <label for="card">Credit Card Information</label>
            <input type="text" id="card" name="card" placeholder="Enter your credit card number" maxlength="19">

            <label for="billing">Billing Address <span>(Required)</span></label>
            <input type="text" id="billing" name="billing" placeholder="Enter your billing address" required>

            <label for="task">Donation Amount:</label>
            <select id="task">
                <option value="">-- Select an option --</option>
                <option value="5">$5</option>
                <option value="10">$10</option>
                <option value="20">$20</option>
                <option value="50">$50</option>
                <option value="100">$100</option>
                <option value="other">Other</option>
            </select>

            <input type="text" id="otherAmount" name="otherAmount" placeholder="Enter other amount" style="display:none; margin-top: 10px;">

            <button type="submit" class="btn btn-sm">Submit</button>
        </form>
      </div>
    </main>
    <footer>
        <p>Copyright &copy; 2026 Shower with Love</p>
    </footer>
        <script>
       document.getElementById("amount").addEventListener("change", function() {
        const custom = document.getElementById("custom-amount");
        custom.style.display = this.value === "other" ? "block" : "none";
      }); 
    </script>
  </body>
</html>
